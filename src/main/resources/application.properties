# Server Configuration
server.port=8080
server.error.include-message=always
server.error.include-binding-errors=always

# MongoDB Configuration - USING ENVIRONMENT VARIABLE
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/lecture_summarizer_db}

# File Upload Configuration
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB
file.upload-dir=./uploads

# JWT Configuration
jwt.secret=${JWT_SECRET:mySecretKeyForJWTTokenGenerationAndValidation2024}
jwt.expiration=86400000

# Python AI Service
ai.service.url=${AI_SERVICE_URL:http://localhost:5001}

# CORS Configuration
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# Allow circular references (temporary fix)
spring.main.allow-circular-references=true

# Logging
logging.level.com.cvr.cse=DEBUG
logging.level.org.springframework.web=INFO