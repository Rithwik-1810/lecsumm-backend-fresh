# Server Configuration
server.port=8080
server.error.include-message=always
server.error.include-binding-errors=always

# MongoDB Configuration
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=lecture_summarizer_db

# File Upload Configuration
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB
file.upload-dir=./uploads

# JWT Configuration
jwt.secret=mySecretKeyForJWTTokenGenerationAndValidation2024
jwt.expiration=86400000

# Python AI Service
ai.service.url=http://localhost:5001

# CORS Configuration
cors.allowed-origins=http://localhost:5173,http://localhost:3000
# Allow circular references (temporary fix)
spring.main.allow-circular-references=true

# Logging
logging.level.com.cvr.cse=DEBUG
logging.level.org.springframework.web=INFO